<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./CSS/style.css">
    <link rel="icon" type="image/png" href="./Imagenes/Iconos/Preparando.png">
    <title>Admin - Preparando El Camino</title>
</head>
<body class="admin-page TextB">

<nav>
    <img class="Logo" id="LogoP" src="./Imagenes/Iconos/Preparando.png" alt="Logo">
    <div class="menu-botones">
        <a class="BotonBa" href="./index.html">Inicio</a>
        <a class="BotonBa activo" href="./admin.html">Admin</a>
    </div>
    <img class="Logo" id="LogoE" src="./Imagenes/Iconos/Emergente.png" alt="Logo Emergente">
</nav>

<div class="admin-container">

    <div class="admin-header">
        <h1>Panel de Administración</h1>
        <button id="adminLogout" class="admin-btn admin-btn-danger">Cerrar sesión</button>
    </div>

    <!-- ============ DEVOCIONAL ============ -->
    <section class="admin-section">
        <h2>Devocional</h2>
        <div class="admin-field">
            <label>Título</label>
            <input type="text" id="devTitulo" placeholder="Título del devocional">
        </div>
        <div class="admin-field">
            <label>Contenido</label>
            <textarea id="devContenido" rows="12" placeholder="Contenido del devocional (puede incluir HTML)"></textarea>
        </div>
        <div class="admin-field-row">
            <button class="admin-btn admin-btn-primary" id="devGuardar">Guardar Devocional</button>
            <span id="devStatus" class="admin-status"></span>
        </div>
    </section>

    <!-- ============ MÚSICA ============ -->
    <section class="admin-section">
        <h2>Música</h2>
        <div class="admin-field">
            <label>Subir nuevo MP3</label>
            <div class="admin-field-row">
                <input type="file" id="musicaFile" accept=".mp3">
                <input type="text" id="musicaTitulo" placeholder="Título (opcional)">
                <input type="text" id="musicaArtista" placeholder="Artista (opcional)">
                <button class="admin-btn admin-btn-primary" id="musicaSubir">Subir</button>
            </div>
        </div>
        <div class="admin-field">
            <label>Canciones actuales</label>
            <ul class="admin-lista" id="musicaLista">
                <li class="admin-lista-empty">Cargando...</li>
            </ul>
        </div>
        <span id="musicaStatus" class="admin-status"></span>
    </section>

    <!-- ============ EVENTOS ============ -->
    <section class="admin-section">
        <h2>Eventos Especiales</h2>
        <div class="admin-field-row">
            <div class="admin-field">
                <label>Título del evento</label>
                <input type="text" id="evTitulo" placeholder="Título">
            </div>
            <div class="admin-field">
                <label>Nota</label>
                <input type="text" id="evNota" placeholder="Texto de la nota">
            </div>
        </div>
        <div class="admin-field">
            <label>Ruta de imagen (ej: ./Imagenes/Eventos/xxx.jpeg)</label>
            <input type="text" id="evImagen" placeholder="./Imagenes/Eventos/">
        </div>
        <div class="admin-field">
            <label>Ítems (uno por línea)</label>
            <textarea id="evItems" rows="4" placeholder="Cada línea es un ítem del evento"></textarea>
        </div>
        <div class="admin-field-row">
            <button class="admin-btn admin-btn-primary" id="evAgregar">Agregar Evento</button>
            <span id="evStatus" class="admin-status"></span>
        </div>
        <div class="admin-field">
            <label>Eventos actuales</label>
            <ul class="admin-lista" id="eventosLista">
                <li class="admin-lista-empty">Cargando...</li>
            </ul>
        </div>
    </section>

</div>

<script>
const TOKEN = sessionStorage.getItem("gh_token");
if (!TOKEN) window.location.href = "./index.html";
const OWNER = "tomy360";
const REPO = "tomy360.github.io";
const BRANCH = "main";
const API = `https://api.github.com/repos/${OWNER}/${REPO}`;
const headers = {
    Authorization: "token " + TOKEN,
    Accept: "application/vnd.github.v3+json"
};

function msg(el, txt, ok) {
    el.textContent = txt;
    el.style.color = ok ? "#5A7863" : "#c0392b";
    setTimeout(() => el.textContent = "", 3000);
}

async function getSha(ruta) {
    try {
        const r = await fetch(`${API}/contents/${ruta}`, { headers });
        if (r.status === 404) return null;
        const d = await r.json();
        return d.sha;
    } catch { return null; }
}

async function putJson(ruta, data) {
    const sha = await getSha(ruta);
    const body = {
        message: `Actualizar ${ruta}`,
        content: btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2)))),
        branch: BRANCH
    };
    if (sha) body.sha = sha;
    const r = await fetch(`${API}/contents/${ruta}`, {
        method: "PUT",
        headers,
        body: JSON.stringify(body)
    });
    return r.ok;
}

async function getJson(ruta) {
    try {
        const r = await fetch(`${API}/contents/${ruta}`, { headers });
        if (r.status === 404) return null;
        const d = await r.json();
        return JSON.parse(decodeURIComponent(escape(atob(d.content))));
    } catch { return null; }
}

async function delFile(ruta, mensaje) {
    const sha = await getSha(ruta);
    if (!sha) return true;
    const r = await fetch(`${API}/contents/${ruta}`, {
        method: "DELETE",
        headers,
        body: JSON.stringify({ message: mensaje || `Eliminar ${ruta}`, sha, branch: BRANCH })
    });
    return r.ok;
}

async function putFile(ruta, contenido, mensaje) {
    const sha = await getSha(ruta);
    const body = {
        message: mensaje || `Subir ${ruta}`,
        content: btoa(unescape(encodeURIComponent(contenido))),
        branch: BRANCH
    };
    if (sha) body.sha = sha;
    const r = await fetch(`${API}/contents/${ruta}`, {
        method: "PUT",
        headers,
        body: JSON.stringify(body)
    });
    return r.ok;
}

async function putFileBinary(ruta, base64, mensaje) {
    const sha = await getSha(ruta);
    const body = {
        message: mensaje || `Subir ${ruta}`,
        content: base64,
        branch: BRANCH
    };
    if (sha) body.sha = sha;
    const r = await fetch(`${API}/contents/${ruta}`, {
        method: "PUT",
        headers,
        body: JSON.stringify(body)
    });
    return r.ok;
}

// ===== DEVOCIONAL =====
const devTitulo = document.getElementById("devTitulo");
const devContenido = document.getElementById("devContenido");
const devGuardar = document.getElementById("devGuardar");
const devStatus = document.getElementById("devStatus");

async function cargarDevocional() {
    const d = await getJson("data/devocional.json");
    if (d) {
        devTitulo.value = d.titulo || "";
        devContenido.value = d.contenido || "";
    }
}

devGuardar.addEventListener("click", async function () {
    this.disabled = true;
    this.textContent = "Guardando...";
    const ok = await putJson("data/devocional.json", {
        titulo: devTitulo.value.trim(),
        contenido: devContenido.value.trim()
    });
    msg(devStatus, ok ? "Devocional guardado" : "Error al guardar", ok);
    this.disabled = false;
    this.textContent = "Guardar Devocional";
});

// ===== MÚSICA =====
const musicaFile = document.getElementById("musicaFile");
const musicaTitulo = document.getElementById("musicaTitulo");
const musicaArtista = document.getElementById("musicaArtista");
const musicaSubir = document.getElementById("musicaSubir");
const musicaLista = document.getElementById("musicaLista");
const musicaStatus = document.getElementById("musicaStatus");

async function cargarMusica() {
    try {
        const r = await fetch(`${API}/git/trees/${BRANCH}?recursive=1`, { headers });
        const d = await r.json();
        const archivos = (d.tree || []).filter(f => f.path.startsWith("Musica/") && f.path.endsWith(".mp3"));
        const canciones = await getJson("data/canciones.json") || [];
        musicaLista.innerHTML = "";
        if (!archivos.length) {
            musicaLista.innerHTML = '<li class="admin-lista-empty">No hay canciones</li>';
            return;
        }
        archivos.forEach(f => {
            const nombre = f.path.replace("Musica/", "");
            const cancion = canciones.find(c => c.src.includes(nombre));
            const li = document.createElement("li");
            li.innerHTML = '<span>' + (cancion ? cancion.titulo + " - " + cancion.interpretes : nombre) + '</span><button class="admin-btn admin-btn-small admin-btn-danger" data-file="' + f.path + '">Eliminar</button>';
            li.querySelector("button").addEventListener("click", async function () {
                if (!confirm("¿Eliminar " + nombre + "?")) return;
                const ok = await delFile(f.path, "Eliminar " + nombre);
                if (ok) {
                    const lista = await getJson("data/canciones.json") || [];
                    const filtradas = lista.filter(c => !c.src.includes(nombre));
                    await putJson("data/canciones.json", filtradas);
                }
                msg(musicaStatus, ok ? "Eliminado" : "Error", ok);
                cargarMusica();
            });
            musicaLista.appendChild(li);
        });
    } catch {
        musicaLista.innerHTML = '<li class="admin-lista-empty">Error al cargar</li>';
    }
}

musicaSubir.addEventListener("click", async function () {
    const file = musicaFile.files[0];
    if (!file) return msg(musicaStatus, "Seleccioná un archivo MP3", false);
    this.disabled = true;
    this.textContent = "Subiendo...";
    const nombre = file.name;

    const reader = new FileReader();
    reader.onload = async function (e) {
        const base64 = e.target.result.split(",")[1];
        const ok1 = await putFileBinary("Musica/" + nombre, base64, "Subir " + nombre);
        if (ok1) {
            const titulo = musicaTitulo.value.trim() || nombre.replace(/\.mp3$/i, "");
            const artista = musicaArtista.value.trim() || "Desconocido";
            const lista = await getJson("data/canciones.json") || [];
            lista.push({ titulo, interpretes: artista, src: "./Musica/" + nombre });
            await putJson("data/canciones.json", lista);
            musicaTitulo.value = "";
            musicaArtista.value = "";
            musicaFile.value = "";
            cargarMusica();
        }
        msg(musicaStatus, ok1 ? "Subido correctamente" : "Error al subir", ok1);
        musicaSubir.disabled = false;
        musicaSubir.textContent = "Subir";
    };
    reader.readAsDataURL(file);
});

// ===== EVENTOS =====
const evTitulo = document.getElementById("evTitulo");
const evNota = document.getElementById("evNota");
const evImagen = document.getElementById("evImagen");
const evItems = document.getElementById("evItems");
const evAgregar = document.getElementById("evAgregar");
const evStatus = document.getElementById("evStatus");
const eventosLista = document.getElementById("eventosLista");

async function cargarEventosAdmin() {
    const eventos = await getJson("data/eventos.json") || [];
    eventosLista.innerHTML = "";
    if (!eventos.length) {
        eventosLista.innerHTML = '<li class="admin-lista-empty">No hay eventos</li>';
        return;
    }
    eventos.forEach((ev, i) => {
        const li = document.createElement("li");
        li.innerHTML = '<span>' + ev.titulo + '</span><button class="admin-btn admin-btn-small admin-btn-danger" data-idx="' + i + '">Eliminar</button>';
        li.querySelector("button").addEventListener("click", async function () {
            if (!confirm("¿Eliminar evento \"" + ev.titulo + "\"?")) return;
            const lista = await getJson("data/eventos.json") || [];
            lista.splice(i, 1);
            const ok = await putJson("data/eventos.json", lista);
            msg(evStatus, ok ? "Evento eliminado" : "Error", ok);
            cargarEventosAdmin();
        });
        eventosLista.appendChild(li);
    });
}

evAgregar.addEventListener("click", async function () {
    const titulo = evTitulo.value.trim();
    if (!titulo) return msg(evStatus, "El título es obligatorio", false);
    this.disabled = true;
    this.textContent = "Agregando...";
    const items = evItems.value.split("\n").filter(s => s.trim()).map(s => s.trim());
    const evento = {
        imagen: evImagen.value.trim() || "./Imagenes/Eventos/",
        titulo: titulo,
        items: items.length ? items : ["Próximamente"],
        nota: evNota.value.trim() || "¡Te esperamos!"
    };
    const lista = await getJson("data/eventos.json") || [];
    lista.push(evento);
    const ok = await putJson("data/eventos.json", lista);
    if (ok) {
        evTitulo.value = "";
        evNota.value = "";
        evImagen.value = "";
        evItems.value = "";
        cargarEventosAdmin();
    }
    msg(evStatus, ok ? "Evento agregado" : "Error", ok);
    this.disabled = false;
    this.textContent = "Agregar Evento";
});

// ===== INICIO =====
cargarDevocional();
cargarMusica();
cargarEventosAdmin();

document.getElementById("adminLogout").addEventListener("click", function () {
    sessionStorage.removeItem("gh_token");
    window.location.href = "./index.html";
});
</script>

</body>
</html>
